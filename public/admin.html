<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin — TechStore</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; height:100vh; display:flex; flex-direction:column; }

  /* LOGIN */
  #login-screen {
    flex:1; display:flex; align-items:center; justify-content:center;
  }
  .login-box {
    background:#1e293b; border-radius:16px; padding:40px; width:360px;
    border:1px solid #334155; text-align:center;
  }
  .login-box h1 { font-size:22px; margin-bottom:8px; }
  .login-box p { color:#94a3b8; font-size:14px; margin-bottom:28px; }
  .login-input {
    width:100%; padding:12px 16px; background:#0f172a; border:1.5px solid #334155;
    border-radius:10px; color:white; font-size:15px; margin-bottom:14px; outline:none;
  }
  .login-input:focus { border-color:#2563eb; }
  .login-btn {
    width:100%; padding:13px; background:#2563eb; color:white; border:none;
    border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;
  }
  .login-btn:hover { background:#1d4ed8; }
  .login-error { color:#f87171; font-size:13px; margin-top:10px; }

  /* ADMIN APP */
  #admin-app { flex:1; display:none; flex-direction:row; height:100vh; }

  /* SIDEBAR */
  .sidebar {
    width:300px; background:#1e293b; border-right:1px solid #334155;
    display:flex; flex-direction:column;
  }
  .sidebar-head {
    padding:20px; border-bottom:1px solid #334155;
    display:flex; align-items:center; gap:10px;
  }
  .sidebar-head h2 { font-size:16px; font-weight:700; }
  .admin-badge {
    margin-left:auto; background:#16a34a; color:white;
    padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;
  }
  .conv-list { flex:1; overflow-y:auto; }
  .conv-item {
    padding:16px 20px; cursor:pointer; border-bottom:1px solid #1e293b;
    transition:background 0.2s; display:flex; align-items:center; gap:12px;
  }
  .conv-item:hover { background:#334155; }
  .conv-item.active { background:#1d4ed8; }
  .conv-avatar {
    width:42px; height:42px; border-radius:50%; background:#2563eb;
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-last { font-size:12px; color:#94a3b8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .conv-badge {
    background:#ef4444; color:white; border-radius:50%;
    width:20px; height:20px; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .no-convs { padding:32px; text-align:center; color:#64748b; font-size:14px; }

  /* CHAT PANEL */
  .chat-panel { flex:1; display:flex; flex-direction:column; }
  .chat-panel-head {
    padding:16px 24px; background:#1e293b; border-bottom:1px solid #334155;
    display:flex; align-items:center; gap:12px;
  }
  .chat-panel-head h3 { font-size:16px; font-weight:700; }
  .client-status { font-size:12px; color:#94a3b8; }
  .online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4ade80; margin-right:5px; }
  .messages-area {
    flex:1; overflow-y:auto; padding:24px;
    display:flex; flex-direction:column; gap:12px;
    background:#0f172a;
  }
  .msg-row { display:flex; gap:8px; align-items:flex-end; }
  .msg-row.admin { flex-direction:row-reverse; }
  .msg-bubble {
    max-width:65%; padding:11px 16px; border-radius:16px;
    font-size:14px; line-height:1.5;
  }
  .msg-row.client .msg-bubble { background:#1e293b; color:#e2e8f0; border-radius:4px 16px 16px 16px; }
  .msg-row.admin .msg-bubble { background:#2563eb; color:white; border-radius:16px 16px 4px 16px; }
  .msg-time { font-size:11px; color:#475569; }
  .empty-chat { flex:1; display:flex; align-items:center; justify-content:center; color:#475569; font-size:15px; }

  /* INPUT */
  .chat-input-area {
    padding:16px 20px; background:#1e293b; border-top:1px solid #334155;
    display:flex; gap:10px; align-items:flex-end;
  }
  .reply-input {
    flex:1; padding:12px 16px; background:#0f172a; border:1.5px solid #334155;
    border-radius:12px; color:white; font-size:14px; resize:none; outline:none;
    font-family:inherit; max-height:120px;
  }
  .reply-input:focus { border-color:#2563eb; }
  .send-btn {
    padding:12px 20px; background:#2563eb; color:white; border:none;
    border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;
    white-space:nowrap;
  }
  .send-btn:hover { background:#1d4ed8; }
  .send-btn:disabled { background:#334155; color:#64748b; cursor:not-allowed; }

  .notification {
    position:fixed; top:20px; right:20px; background:#2563eb; color:white;
    padding:14px 20px; border-radius:12px; font-size:14px; font-weight:600;
    box-shadow:0 8px 30px rgba(0,0,0,0.4); z-index:999;
    animation:slideIn 0.3s ease; display:none;
  }
  @keyframes slideIn { from { transform:translateX(100px); opacity:0; } to { transform:translateX(0); opacity:1; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Panneau Admin</h1>
    <p>TechStore — Interface de messagerie</p>
    <input class="login-input" type="password" id="pwd-input" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Se connecter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="admin-app">
  <div class="sidebar">
    <div class="sidebar-head">
      <span>💬</span>
      <h2>Conversations</h2>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="no-convs">Aucun client connecté<br>pour l'instant...</div>
    </div>
  </div>
  <div class="chat-panel">
    <div id="empty-state" class="empty-chat">← Sélectionnez une conversation</div>
    <div id="chat-content" style="display:none; flex:1; flex-direction:column; display:none;">
      <div class="chat-panel-head">
        <div class="conv-avatar" id="panel-avatar">👤</div>
        <div>
          <h3 id="panel-name">—</h3>
          <span class="client-status" id="panel-status">En ligne</span>
        </div>
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="chat-input-area">
        <textarea class="reply-input" id="reply-input" placeholder="Répondre au client..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendReply()">Envoyer ➤</button>
      </div>
    </div>
  </div>
</div>

<div class="notification" id="notif"></div>

<script>
let ws = null;
let activeClientId = null;
let conversations = {};

const WS_URL = location.protocol === 'https:'
  ? `wss://${location.host}`
  : `ws://${location.host}`;

function login() {
  const pwd = document.getElementById('pwd-input').value;
  if (!pwd) return;
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'admin_connect', password: pwd }));
  };
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'auth_error') {
      document.getElementById('login-error').textContent = '❌ Mot de passe incorrect';
      ws.close(); return;
    }

    if (data.type === 'init') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'flex';
      data.conversations.forEach(c => { conversations[c.id] = c; });
      renderConvList();
      return;
    }

    if (data.type === 'client_connected') {
      const c = data.conversation;
      if (!conversations[c.id]) conversations[c.id] = c;
      renderConvList();
      showNotif(`🟢 Nouveau visiteur : ${c.name}`);
      return;
    }

    if (data.type === 'new_message') {
      const conv = conversations[data.clientId];
      if (!conv) return;
      conv.messages.push(data.message);
      conv.unread = data.unread || 0;
      renderConvList();
      if (activeClientId === data.clientId) {
        appendMsg(data.message);
        ws.send(JSON.stringify({ type: 'mark_read', clientId: data.clientId }));
        conv.unread = 0;
        renderConvList();
      } else {
        showNotif(`💬 ${conv.name} : ${data.message.text}`);
      }
      return;
    }

    if (data.type === 'message_sent') {
      // Message confirmé, déjà affiché
      return;
    }
  };
  ws.onerror = () => {
    document.getElementById('login-error').textContent = '❌ Impossible de se connecter au serveur';
  };
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  const convs = Object.values(conversations).sort((a,b) => {
    const aT = a.messages[a.messages.length-1]?.time || 0;
    const bT = b.messages[b.messages.length-1]?.time || 0;
    return bT - aT;
  });
  if (!convs.length) {
    list.innerHTML = '<div class="no-convs">Aucun client connecté<br>pour l\'instant...</div>';
    return;
  }
  list.innerHTML = convs.map(c => {
    const last = c.messages[c.messages.length-1];
    const preview = last ? (last.from === 'admin' ? `Vous : ${last.text}` : last.text) : 'Aucun message';
    return `<div class="conv-item ${activeClientId===c.id?'active':''}" onclick="openConv('${c.id}')">
      <div class="conv-avatar">👤</div>
      <div class="conv-info">
        <div class="conv-name">${c.name}</div>
        <div class="conv-last">${preview.substring(0,40)}${preview.length>40?'...':''}</div>
      </div>
      ${c.unread > 0 ? `<div class="conv-badge">${c.unread}</div>` : ''}
    </div>`;
  }).join('');
}

function openConv(id) {
  activeClientId = id;
  const conv = conversations[id];
  conv.unread = 0;
  ws.send(JSON.stringify({ type: 'mark_read', clientId: id }));
  renderConvList();

  document.getElementById('empty-state').style.display = 'none';
  const content = document.getElementById('chat-content');
  content.style.display = 'flex';
  content.style.flexDirection = 'column';
  content.style.flex = '1';

  document.getElementById('panel-name').textContent = conv.name;
  document.getElementById('panel-avatar').textContent = conv.name[0].toUpperCase();

  const area = document.getElementById('messages-area');
  area.innerHTML = '';
  conv.messages.forEach(m => appendMsg(m));
  area.scrollTop = area.scrollHeight;
  document.getElementById('reply-input').focus();
}

function appendMsg(msg) {
  const area = document.getElementById('messages-area');
  const time = new Date(msg.time).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const div = document.createElement('div');
  div.className = `msg-row ${msg.from}`;
  div.innerHTML = `<div><div class="msg-bubble">${escHtml(msg.text)}</div><div class="msg-time">${time}</div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function sendReply() {
  const input = document.getElementById('reply-input');
  const text = input.value.trim();
  if (!text || !activeClientId) return;
  ws.send(JSON.stringify({ type: 'admin_message', clientId: activeClientId, text }));
  input.value = '';
  input.style.height = 'auto';
}

function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.style.display = 'block';
  clearTimeout(window._notifTimer);
  window._notifTimer = setTimeout(() => { n.style.display = 'none'; }, 4000);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
